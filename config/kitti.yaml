# =============================================================================
# SLAMForge — KITTI odometry dataset configuration
# =============================================================================
# KITTI odometry benchmark: stereo camera, grayscale images at 10 Hz.
# Image resolution: 1241x376 (after rectification).
#
# Uses rectified grayscale left-camera images as monocular input.

camera:
  width: 1241
  height: 376
  fx: 718.856
  fy: 718.856
  cx: 607.193
  cy: 185.216
  k1: 0.0   # KITTI images are already rectified
  k2: 0.0
  p1: 0.0
  p2: 0.0
  k3: 0.0

orb:
  num_features: 1200
  scale_factor: 1.2
  num_levels: 8
  ini_threshold: 20
  min_threshold: 7
  patch_size: 31

tracking:
  min_features_for_tracking: 50
  max_frames_between_kf: 40
  min_frames_between_kf: 5
  max_reprojection_error: 4.0
  min_parallax_deg: 1.0

mapping:
  sliding_window_size: 20
  min_observations: 3
  max_reprojection_error: 4.0

loop_closing:
  enabled: false
  min_similarity_score: 0.3
  min_consecutive_loops: 3
  vocab_path: ""
  pose_graph_iterations: 20
  global_ba_iterations: 20
  enable_global_ba: true

output_format: "kitti"
