name: Build & Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

jobs:
  build:
    name: "${{ matrix.os }} / ${{ matrix.compiler }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        compiler: [gcc, clang]
        build_type: [Release, Debug]
        exclude:
          # Reduce combinations — test debug with gcc, release with both
          - os: ubuntu-24.04
            compiler: clang
            build_type: Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ccache \
            libopencv-dev \
            libeigen3-dev \
            libspdlog-dev \
            libyaml-cpp-dev

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}

      - name: Configure compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          fi

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DLITEVO_BUILD_TESTS=ON \
            -DLITEVO_BUILD_APPS=ON \
            -DLITEVO_ENABLE_SOPHUS=OFF \
            -DLITEVO_ENABLE_CERES=OFF \
            -DLITEVO_ENABLE_G2O=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }}

      - name: ccache stats
        run: ccache -s
