name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  RELEASE_VERSION: 3.1.0-beta.1

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-24.04
    steps:
      - name: Check tag matches packaged version
        run: test "${GITHUB_REF_NAME}" = "v${RELEASE_VERSION}"

  linux-appimage:
    name: Linux x86_64 AppImage
    needs: validate-tag
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Canonical package mirrors
        run: |
          printf '%s\t%s\n' \
            'https://archive.ubuntu.com/ubuntu/' 'priority:1' \
            'https://security.ubuntu.com/ubuntu/' 'priority:2' \
            | sudo tee /etc/apt/apt-mirrors.txt >/dev/null

      - name: Install dependencies
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get install -y --no-install-recommends \
            appstream build-essential cmake curl file libfuse2 \
            libceres-dev libeigen3-dev libgl1-mesa-dev libopencv-dev \
            libspdlog-dev libunwind-dev \
            libyaml-cpp-dev \
            qt6-base-dev

      - name: Configure release build
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DSLAMFORGE_BUILD_TESTS=OFF \
            -DSLAMFORGE_BUILD_APPS=ON \
            -DSLAMFORGE_BUILD_DESKTOP=ON \
            -DSLAMFORGE_ENABLE_SOPHUS=OFF \
            -DSLAMFORGE_ENABLE_CERES=ON \
            -DSLAMFORGE_ENABLE_G2O=OFF \
            -DSLAMFORGE_ENABLE_FBOW=OFF

      - name: Build release binaries
        run: >-
          cmake --build build-release
          --target slamforge_desktop slamforge_cli --parallel 2

      - name: Download pinned AppImage deployment tools
        run: |
          mkdir -p deployment-tools
          curl --fail --location --retry 3 \
            --output deployment-tools/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          curl --fail --location --retry 3 \
            --output deployment-tools/linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-x86_64.AppImage
          curl --fail --location --retry 3 \
            --output deployment-tools/runtime-x86_64 \
            https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-x86_64
          echo "2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d  deployment-tools/runtime-x86_64" \
            | sha256sum --check -
          chmod +x deployment-tools/*.AppImage packaging/linux/package-appimage.sh

      - name: Validate AppStream metadata
        run: >-
          appstreamcli validate --no-net
          packaging/linux/org.slamforge.SLAMForge.appdata.xml

      - name: Package AppImage
        run: |
          ./packaging/linux/package-appimage.sh \
            build-release dist "$RELEASE_VERSION" \
            deployment-tools/linuxdeploy-x86_64.AppImage \
            deployment-tools/runtime-x86_64

      - name: Smoke test AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          QT_QPA_PLATFORM: offscreen
        run: |
          dist/SLAMForge-Desktop-${RELEASE_VERSION}-Linux-x86_64.AppImage \
            --smoke-result tests/data/desktop-result

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86-64
          path: dist/SLAMForge-Desktop-3.1.0-beta.1-Linux-x86_64.AppImage
          if-no-files-found: error

  windows-zip:
    name: Windows x64 portable ZIP
    needs: validate-tag
    runs-on: windows-2022
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-desktop-${{ hashFiles('packaging/windows/vcpkg.json') }}
          restore-keys: windows-vcpkg-desktop-

      - name: Configure release build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          cmake -S . -B build-release -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_DIR="${{ github.workspace }}/packaging/windows" `
            -DVCPKG_INSTALLED_DIR="${{ github.workspace }}/vcpkg_installed" `
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/packaging/windows/triplets" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-release `
            -DSLAMFORGE_BUILD_TESTS=OFF `
            -DSLAMFORGE_BUILD_APPS=ON `
            -DSLAMFORGE_BUILD_DESKTOP=ON `
            -DSLAMFORGE_ENABLE_SOPHUS=OFF `
            -DSLAMFORGE_ENABLE_CERES=ON `
            -DSLAMFORGE_ENABLE_G2O=OFF `
            -DSLAMFORGE_ENABLE_FBOW=OFF

      - name: Build release binaries
        run: >-
          cmake --build build-release --config Release
          --target slamforge_desktop slamforge_cli --parallel 2

      - name: Package portable ZIP
        shell: pwsh
        run: |
          ./packaging/windows/package.ps1 `
            -BuildDirectory build-release `
            -VcpkgInstalledDirectory vcpkg_installed `
            -OutputDirectory dist `
            -Version $env:RELEASE_VERSION

      - name: Smoke test portable package
        shell: pwsh
        run: |
          $package = "dist/SLAMForge-Desktop-$env:RELEASE_VERSION-Windows-x64"
          $process = Start-Process `
            -FilePath "$package/SLAMForge Desktop.exe" `
            -ArgumentList "--smoke-result", "tests/data/desktop-result" `
            -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Desktop result smoke test failed with exit code $($process.ExitCode)"
          }
          & "$package/slamforge_cli.exe" --help
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged CLI smoke test failed with exit code $LASTEXITCODE"
          }

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86-64
          path: dist/SLAMForge-Desktop-3.1.0-beta.1-Windows-x64.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [linux-appimage, windows-zip]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: sha256sum *.AppImage *.zip > SHA256SUMS.txt

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --prerelease \
            --title "SLAMForge Desktop ${RELEASE_VERSION}" \
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md" \
            release-assets/*.AppImage \
            release-assets/*.zip \
            release-assets/SHA256SUMS.txt
